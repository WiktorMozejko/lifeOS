<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - lifeOS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="dashboard-page">
            <nav class="navbar">
                <div class="navbar-brand">
                    <h1>lifeOS</h1>
                </div>
                <div class="navbar-menu">
                    <span id="user-greeting">Witaj!</span>
                    <button class="btn btn-secondary" onclick="logout()">Wyloguj się</button>
                </div>
            </nav>

            <div class="dashboard-main">
                <div class="welcome-section">
                    <h2>Witaj, <span id="dash-user-name"></span>!</h2>
                    <p class="welcome-text">Jesteś zalogowany do systemu lifeOS</p>
                </div>

                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <h3>Email</h3>
                        <p id="dash-user-email"></p>
                    </div>

                    <div class="dashboard-card">
                        <h3>Status</h3>
                        <p>Aktywny użytkownik</p>
                    </div>

                    <div class="dashboard-card">
                        <h3>Działania</h3>
                        <ul>
                            <li>📝 Zarządzaj profilem</li>
                            <li>🔐 Zmień hasło</li>
                            <li>⚙️ Ustawienia</li>
                        </ul>
                    </div>

                    <div class="dashboard-card">
                        <h3>Szybkie linki</h3>
                        <ul>
                            <li><a href="/api/auth/me">Moje dane</a></li>
                            <li><a href="#" onclick="logout()">Wyloguj</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if user is logged in
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me');
                if (response.ok) {
                    const data = await response.json();
                    const username = data.user.email.split('@')[0];
                    document.getElementById('dash-user-name').textContent = username;
                    document.getElementById('dash-user-email').textContent = data.user.email;
                    document.getElementById('user-greeting').textContent = `Cześć, ${username}!`;
                } else {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Error:', error);
                window.location.href = '/';
            }
        }

        // Logout handler
        function logout() {
            fetch('/api/auth/logout', {
                method: 'POST'
            }).then(() => {
                window.location.href = '/';
            });
        }

        // Load on page load
        window.addEventListener('load', checkAuth);
    </script>
</body>
</html>
